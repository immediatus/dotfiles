# Yazi file manager configuration
# Written from scratch for a clean, reproducible setup

[mgr]
ratio          = [ 1, 4, 4 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "mc_style"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_event    = [ "touch", "scroll", "click", "move", "drag" ]

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 900
max_height      = 1350
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912  # 512MB
image_bound      = [ 0, 0 ]
suppress_preload = false

[[plugin.prepend_previewers]]
mime = "application/{zip,x-tar,x-7z-compressed,x-rar,x-xz,x-zstd}"
run  = "ouch --archive-icon='🗄️ ' --show-file-icons"
